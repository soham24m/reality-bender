<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reality Bender — Face Deformation and Liquid Glass HUD">
    <title>Reality Bender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Video background */
        #webcam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            transform: scaleX(-1); /* mirror feed */
        }

        /* Primary and secondary canvases */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            pointer-events: none;
            transform: scaleX(-1); /* mirror to align with webcam */
        }

        #gameCanvas {
            z-index: 1;
        }

        #deformationCanvas {
            z-index: 2;
        }

        /* Apple Liquid Glass Dock */
        .glass-dock {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 12px 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 24px;
            align-items: center;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tracking status dot */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8e8e93; /* default grey */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-dot.active {
            background: #34c759; /* green */
            box-shadow: 0 0 8px rgba(52, 199, 89, 0.8);
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-dot.flash {
            background: #ffffff !important;
            box-shadow: 0 0 12px rgba(255, 255, 255, 1.0) !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Detected expression text */
        .expression-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: rgba(255, 255, 255, 0.85);
            min-width: 120px;
            text-align: center;
            transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* FPS counter */
        .fps-counter {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-variant-numeric: tabular-nums;
        }

        /* Floating effect pill */
        .effect-pill {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            padding: 8px 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.9);
            z-index: 10;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .effect-pill.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Mirrored full-screen video background -->
    <video id="webcam" autoplay playsinline muted></video>

    <!-- Transparent Canvas for overlays -->
    <canvas id="gameCanvas"></canvas>

    <!-- Secondary Canvas for elastic face deformation -->
    <canvas id="deformationCanvas"></canvas>

    <!-- Liquid Glass Dock at bottom center -->
    <div class="glass-dock" id="glassDock">
        <div class="status-dot" id="statusDot"></div>
        <div class="expression-text" id="expressionText">No face detected</div>
        <div class="fps-counter" id="fpsCounter">-- fps</div>
    </div>

    <!-- Floating Pill top-right for active effect -->
    <div class="effect-pill" id="effectPill">Normal Mode</div>

    <!-- MediaPipe Solutions via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

    <!-- App entry point -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
