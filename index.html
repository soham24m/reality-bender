<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reality Bender — Elastic Face Deformation">
    <title>Reality Bender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Video background — mirrored like a selfie cam */
        #webcam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            transform: scaleX(-1);
        }

        /* Effect canvas — NOT mirrored in CSS, mirroring handled in JS */
        #effectCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent !important;
            pointer-events: none;
            z-index: 3;
        }

        /* Bottom-left glass pill */
        .glass-pill {
            position: fixed;
            bottom: 28px;
            left: 28px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 10px 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            transition: opacity 150ms ease, transform 150ms ease;
        }

        .glass-pill.transitioning {
            opacity: 0;
            transform: translateY(4px);
        }

        /* Tracking dot */
        .track-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .track-dot.active {
            background: rgba(120, 255, 160, 0.9);
            box-shadow: 0 0 6px rgba(120, 255, 160, 0.6);
            animation: dot-pulse 2s infinite ease-in-out;
        }

        @keyframes dot-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Text container */
        .pill-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .pill-action {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.03em;
            text-transform: capitalize;
            line-height: 1.2;
        }

        .pill-status {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.05em;
            line-height: 1;
        }
    </style>
</head>
<body>
    <!-- Mirrored full-screen video background -->
    <video id="webcam" autoplay playsinline muted></video>

    <!-- Effect canvas for rubber face warping -->
    <canvas id="effectCanvas"></canvas>

    <!-- Bottom-left minimal glass pill -->
    <div class="glass-pill" id="glassPill">
        <div class="track-dot" id="trackDot"></div>
        <div class="pill-text">
            <div class="pill-action" id="pillAction">Ready</div>
            <div class="pill-status" id="pillStatus">searching...</div>
        </div>
    </div>

    <!-- MediaPipe Solutions via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

    <!-- App entry point -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
